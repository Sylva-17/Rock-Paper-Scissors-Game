<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Paper.css">
    <script src="Scissors.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <title>Rock Paper Scissors Game</title>
</head>
<body>
    
    <div class="container">
        <div class="score">
              <h3>Score: </h3>
        </div>
        <div class="robotChoice">
            <div class="choice"><i class="fa-solid fa-hand-back-fist" style="color: #003049;"></i></div>
            <div class="choice"><i class="fa-solid fa-hand-scissors" style="color: #003049;"></i></div>
            <div class="choice"><i class="fa-solid fa-hand" style="color: #003049;"></i></div>


        </div>
        <div class="result"></div>
        <div class="Mychoice">
            <div class="choice"><i class="fa-solid fa-hand-back-fist" style="color: #003049;"></i></div>
            <div class="choice"><i class="fa-solid fa-hand-scissors" style="color: #003049;"></i></div>
            <div class="choice"><i class="fa-solid fa-hand" style="color: #003049;"></i></div>

        </div>
    </div>
    
</body>
</html>
